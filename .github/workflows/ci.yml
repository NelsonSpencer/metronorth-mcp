name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install actionlint
        run: |
          set -euo pipefail

          version="1.7.12"
          asset="actionlint_${version}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/${asset}"
          checksum="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"

          mkdir -p /tmp/actionlint
          curl -fsSL "$url" -o "/tmp/actionlint/${asset}"
          echo "${checksum}  /tmp/actionlint/${asset}" | sha256sum -c -
          tar -xzf "/tmp/actionlint/${asset}" -C /tmp/actionlint

      - name: Lint GitHub Actions workflows
        run: /tmp/actionlint/actionlint -color

  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: MCP smoke
        run: npm run smoke:mcp

      - name: MCP smoke (http)
        run: npm run smoke:http
