version: 2

registries:
  public-npm:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  - package-ecosystem: npm
    directory: /
    registries:
      - public-npm
    schedule:
      interval: weekly
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps are handled deliberately (see docs/dependency-upgrades.md),
      # not via automated Dependabot PRs. update-types inside `groups` only
      # controls batching, so this top-level ignore is what actually holds
      # majors back.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
